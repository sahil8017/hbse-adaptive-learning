name: CI

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

jobs:
  # ── Backend (Python) ──────────────────────────────────────────────────────────
  backend:
    name: Backend — lint + test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: hbse_test
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff pytest pytest-asyncio httpx pytest-cov

      - name: Lint with ruff
        run: ruff check backend/ --output-format=github

      - name: Run backend tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/hbse_test
          SECRET_KEY: test_secret_key_that_is_at_least_32_chars_long
          OPENROUTER_API_KEY: ""
          ADMIN_SECRET: ""
          PYTHONPATH: .
        run: |
          pytest backend/tests/ -v \
            --cov=backend/app \
            --cov-report=term-missing \
            --cov-report=xml:coverage.xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          flags: backend
        continue-on-error: true

  # ── Frontend (TypeScript / Next.js) ──────────────────────────────────────────
  frontend:
    name: Frontend — lint + type-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: ESLint
        run: cd frontend && npx eslint src/ --max-warnings=0

      - name: TypeScript type-check
        run: cd frontend && npx tsc --noEmit

  # ── Docker build (main branch only) ──────────────────────────────────────────
  docker:
    name: Docker build check
    runs-on: ubuntu-latest
    needs: [backend, frontend]
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build unified Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: hbse-app:ci
